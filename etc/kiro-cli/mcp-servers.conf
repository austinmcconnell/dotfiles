#!/bin/bash
# Shared MCP server definitions used by install and update scripts

# Node.js MCP servers (installed globally via npm)
NODE_MCP_SERVERS=(
    "@aashari/mcp-server-atlassian-jira"
    "kubernetes-mcp-server"
)

# Python MCP servers (cached via uvx)
PYTHON_MCP_SERVERS=(
    "mcp-server-git"
    "mcp-server-time"
)

# GitHub MCP Server (built from source)
GITHUB_MCP_REPO_DIR="$HOME/.repositories/github-mcp-server"
GITHUB_MCP_BINARY="$HOME/.local/bin/github-mcp-server"
GITHUB_MCP_REPO_URL="https://github.com/github/github-mcp-server.git"
