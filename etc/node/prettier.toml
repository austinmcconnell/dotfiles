# Prettier configuration for Vim ALE and Sublime Text
# Handles markdown (2 spaces), JSON (4 spaces), and Sublime settings (4 spaces, no trailing commas)

# Use 2-space indentation for markdown (standard convention)
tabWidth = 2

# Wrap lines at 100 characters
printWidth = 100

# Wrap markdown prose
proseWrap = "preserve"

# Don't add semicolons in JavaScript
semi = false

# Single quotes disabled - using Prettier defaults
#singleQuote = true

# JSON-specific overrides (4 spaces for JSON files)
[[overrides]]
files = "*.json"
[overrides.options]
tabWidth = 4

# Sublime settings overrides (4 spaces, no trailing commas)
[[overrides]]
files = "*.sublime-settings"
[overrides.options]
tabWidth = 4
trailingComma = "none"
