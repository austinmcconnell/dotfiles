---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: keda-demo-worker
  namespace: podinfo
spec:
  scaleTargetRef:
    name: keda-demo-worker
  minReplicaCount: 0
  maxReplicaCount: 5
  pollingInterval: 5
  cooldownPeriod: 30
  triggers:
    - type: redis
      metadata:
        address: podinfo-backend-redis.podinfo.svc.cluster.local:6379
        listName: keda-demo-queue
        listLength: "3"
