# Loki monolithic mode — filesystem storage, 7-day retention
# Chart: grafana-community/loki (community-maintained since March 2026)
# Docs: https://grafana.com/docs/loki/latest/setup/install/helm/install-monolithic/
---

deploymentMode: Monolithic

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: filesystem

  limits_config:
    retention_period: 168h
    max_query_lookback: 168h
    allow_structured_metadata: true
    volume_enabled: true

  compactor:
    retention_enabled: true
    compaction_interval: 10m
    retention_delete_delay: 2h
    retention_delete_worker_count: 150
    delete_request_store: filesystem

  ruler:
    enable_api: true

  analytics:
    reporting_enabled: false

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  persistence:
    enabled: true
    size: 5Gi
    storageClass: local-path

# Disable components not needed for monolithic dev setup
gateway:
  enabled: false
minio:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false
lokiCanary:
  enabled: false
test:
  enabled: false

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
